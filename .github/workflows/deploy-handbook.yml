name: Deploy handbook (GitHub Pages)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'docs/handbook/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-handbook.yml'

permissions:
  contents: write

concurrency:
  group: pages-handbook
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # peaceiris/actions-gh-pages v4 still targets node20; GitHub is moving JS actions to node24.
    # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0 (Node 24 runtime)
        with:
          run_install: false
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: '**/pnpm-lock.yaml'
      - run: pnpm install --frozen-lockfile
      - name: Build VitePress site
        env:
          VITEPRESS_BASE: /${{ github.event.repository.name }}/
        run: pnpm docs:build
      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: docs/handbook/.vitepress/dist
          force_orphan: true
